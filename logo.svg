<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <!-- 紫色强调渐变 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    <!-- 圆角阴影滤镜 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#667eea" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- 幻灯片边框 -->
  <rect x="40" y="32" width="120" height="80" rx="10" ry="10"
        fill="white" opacity="0.95"/>
  <!-- 幻灯片内容线 -->
  <rect x="52" y="46" width="60" height="8" rx="3" fill="#667eea" opacity="0.8"/>
  <rect x="52" y="60" width="96" height="6" rx="2" fill="#c4b5fd"/>
  <rect x="52" y="72" width="80" height="6" rx="2" fill="#c4b5fd"/>
  <rect x="52" y="84" width="88" height="6" rx="2" fill="#e5e7eb"/>

  <!-- 播放按钮（右下） -->
  <circle cx="136" cy="96" r="16" fill="url(#accentGrad)"/>
  <polygon points="131,88 131,104 147,96" fill="white"/>

  <!-- 装饰：左侧彩色方块 -->
  <rect x="36" y="120" width="14" height="14" rx="3" fill="#fbbf24" opacity="0.9"/>
  <rect x="36" y="140" width="14" height="14" rx="3" fill="#34d399" opacity="0.9"/>
  <rect x="36" y="160" width="14" height="14" rx="3" fill="#f87171" opacity="0.9"/>

  <!-- 主标题：Slide -->
  <text x="72" y="158" font-family="'Segoe UI','PingFang SC',sans-serif"
        font-size="38" font-weight="800" fill="white" letter-spacing="2">
    Slide
  </text>
  <!-- 副标题：Craft -->
  <text x="72" y="188" font-family="'Segoe UI','PingFang SC',sans-serif"
        font-size="34" font-weight="800" fill="#a78bfa" letter-spacing="3">
    Craft
  </text>

  <!-- 装饰弧线 -->
  <path d="M 55 195 Q 100 210 145 195" stroke="#a78bfa" stroke-width="2.5"
        fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
